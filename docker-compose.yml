version: '3.8'

services:
  hn-postgres:
    image: postgres:16-alpine
    container_name: hn-postgres
    restart: always
    environment:
      POSTGRES_DB: hosting_nepal
      POSTGRES_USER: hosting_nepal
      POSTGRES_PASSWORD: HN_SecureDB_2026!
    volumes:
      - hn_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hosting_nepal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hn-network

  hn-redis:
    image: redis:7-alpine
    container_name: hn-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - hn_redisdata:/data
    networks:
      - hn-network

  hn-backend:
    build: ./backend
    container_name: hn-backend
    restart: always
    env_file: ./backend/.env.production
    ports:
      - "127.0.0.1:4001:4001"
    depends_on:
      hn-postgres:
        condition: service_healthy
      hn-redis:
        condition: service_started
    networks:
      - hn-network

  hn-frontend:
    build: ./frontend
    container_name: hn-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://api.hostingnepals.com/api/v1
      NEXT_PUBLIC_APP_URL: https://hostingnepals.com
      INTERNAL_API_URL: http://hn-backend:4001/api/v1
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - hn-backend
    networks:
      - hn-network

volumes:
  hn_pgdata:
  hn_redisdata:

networks:
  hn-network:
    driver: bridge
